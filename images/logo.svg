<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="200" height="225">
  <!-- Lemon body -->
  <ellipse cx="400" cy="380" rx="220" ry="240" fill="#F5D547"/>
  
  <!-- Lemon leaf -->
  <path d="M 520 180 Q 600 100 650 150 Q 620 120 550 140 Q 540 155 520 180" fill="#0D5C3C"/>
  
  <!-- Lemon leaf outline/stem -->
  <path d="M 520 180 L 480 160 Q 500 140 520 180" stroke="#0D5C3C" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Spray bottle on right -->
  <g transform="translate(550, 550)">
    <!-- Bottle body -->
    <rect x="0" y="40" width="100" height="120" rx="15" fill="#0D5C3C"/>
    <!-- Bottle neck -->
    <rect x="30" y="20" width="40" height="25" rx="5" fill="#0D5C3C"/>
    <!-- Spray trigger -->
    <path d="M 65 15 L 85 0 L 90 20 L 70 25 Z" fill="#0D5C3C"/>
  </g>
  
  <!-- Text: LEMON MAID -->
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#0D5C3C" text-anchor="middle" dominant-baseline="middle">
    LEMON
  </text>
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#0D5C3C" text-anchor="middle">
    MAID
  </text>
  <text x="400" y="570" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#0D5C3C" text-anchor="middle">
    CLEANING
  </text>
</svg>